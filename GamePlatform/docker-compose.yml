services:
  # ─── CONTAINER A: INTERACTIVE WEB WORKSPACE ─────────────────────────────────
  frontend-ui:
    build:
      context: ./app_ui
      dockerfile: Dockerfile
    container_name: chefrpg_creator_ui
    ports:
      - "8000:80" # Map browser access to local Port 8000
    restart: unless-stopped
    depends_on:
      - ai-backend

  # ─── CONTAINER B: HARDWARE-ADAPTIVE AI ENGINE ──────────────────────────────
  ai-backend:
    build:
      context: ./ai_backend
      dockerfile: Dockerfile
    container_name: chefrpg_ai_backend
    ports:
      - "7860:7860" # Map AI REST API hooks to local Port 7860
    restart: unless-stopped
    
    # Persistent Volumes protect your data logs and prevent re-downloading model weights
    volumes:
      - ai_model_cache:/app/cache          # Protects the pre-cached SDXL-Turbo model files
      - generation_history:/app/app_history_logs # Protects your saved map histories
      
    # AUTOMATED HARDWARE AUTO-DETECTION MATRIX BRIDGE
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# Declare explicit data volumes so files survive container rebuilds and teardowns
volumes:
  ai_model_cache:
    driver: local
  generation_history:
    driver: local
