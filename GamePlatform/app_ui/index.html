<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Semantic Game Creator Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="sidebar">
        <h3>🎨 Theme Presets</h3>
        <select id="themeSelect">
            <optgroup label="🏰 Basic Environments">
                <option value="cozy_tavern">🏰 Cozy Tavern (Medieval)</option>
                <option value="cyberpunk_cafe">🏮 Cyberpunk Café (Futuristic)</option>
                <option value="forest_market">🌲 Forest Marketplace (Fantasy)</option>
                <option value="steampunk_greenhouse">⚙️ Steampunk Greenhouse</option>
                <option value="haunted_manor">🦇 Haunted Manor (Gothic)</option>
                <option value="coastal_beach_grill">🏖️ Coastal Beach Grill</option>
                <option value="ancient_temple">🗿 Ancient Temple (Overgrown)</option>
                <option value="alpine_snowy_lodge">❄️ Alpine Snowy Lodge</option>
                <option value="retro_arcade">🕹️ Retro Arcade (Synthwave)</option>
                <option value="dwarven_brewery">🌋 Dwarven Brewery</option>
            </optgroup>
            <optgroup label="🌍 International & Special Styles">
                <option value="japanese_village">🏮 Japanese Mountain Village</option>
                <option value="scandinavian_town">⛵ Scandinavian Coastal Town</option>
                <option value="moroccan_bazaar">🕌 Moroccan Open Bazaar</option>
                <option value="cyberpunk_market">🌌 Neon Cyberpunk Street Market</option>
                <option value="rainy_neon_alley">0🌧️ Rainy Neon City Alley</option>
                <option value="volcanic_wasteland">🌋 Volcanic Obsidian Wasteland</option>
            </optgroup>
        </select>

        <h3>🛠 Img2Img Prompt Matrix</h3>
        <input type="text" id="customThemeName" placeholder="Theme ID (e.g., Space_Outpost)">
        <textarea id="customThemePrompt" placeholder="Inject custom positive style variables here..."></textarea>
        <button id="saveThemeBtn">💾 Inject Custom Theme Profile</button>

        <h3>📐 Stroke Configuration</h3>
        <select id="brushModeSelect">
            <option value="standard">✏️ Standard Manual Placement</option>
            <option value="autotile">🧱 Contextual Auto-Tiling Brush</option>
        </select>

        <h3>🖌️ Toolkit Brush Palettes</h3>
        <button onclick="setBrush('#000000')">Wall Layer Block (Black)</button>
        <button onclick="setBrush('#ffffff')">Floor Navigation Tile (White)</button>
        <button onclick="setBrush('#00ff00')">Player Actor Spawn (Green)</button>
        <button onclick="setBrush('eraser')">Eraser Tool (Clear Tile)</button>
        <button id="enhanceBtn">⚡ AI Enhance Region</button>

        <h3>💡 Ambient Light Overlay</h3>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#7c7c8a; margin-bottom:4px;">
            <span>Brightness Level</span><span id="lightValDisplay">100%</span>
        </div>
        <input type="range" id="ambientLightSlider" min="15" max="100" value="100" style="cursor:pointer; accent-color:#8257e5;">

        <h3>🏃 Character Skins</h3>
        <select id="characterSkinSelect">
            <option value="chef_male">👨‍🍳 Head Chef (Default)</option>
            <option value="baker_female">👩‍🍳 Artisan Pastry Baker</option>
            <option value="cyborg_waiter">🤖 Neon Cyber Waiter</option>
            <option value="rogue_adventurer">🧝 Forest Forager</option>
        </select>

        <h3>📤 Sprite Sheet Ingestion</h3>
        <label for="customSpriteInput" class="custom-file-upload">📂 Upload Custom Character Sheet</label>
        <input type="file" id="customSpriteInput" accept="image/png, image/jpeg">
        <div id="uploadFeedback">✓ Custom asset bundle cached!</div>

        <h3>💾 Slot Save Directories</h3>
        <select id="projectSlotSelect">
            <option value="slot_1">Backup Directory File Slot 1</option>
            <option value="slot_2">Backup Directory File Slot 2</option>
            <option value="slot_3">Backup Directory File Slot 3</option>
        </select>
        <div class="btn-group">
            <button id="saveProjectBtn">Save Map</button>
            <button id="loadProjectBtn">Load Map</button>
        </div>

        <h3>📦 Build Exporter</h3>
        <button id="exportBuildBtn">Package Standalone Game</button>

        <button onclick="setBrush('#ff0000')">Patrolling Enemy (Red)</button>
        <button onclick="setBrush('#ff9900')">Interactable Chest/Object (Orange)</button>

    </div>
    
    <div id="canvasContainer">
        <canvas id="paintCanvas" width="512" height="512"></canvas>
        <div id="marqueeBox"></div>
    </div>

    <audio id="ambientAudioPlayer" loop></audio>
    <script src="exporter.js"></script>
</body>
</html>
